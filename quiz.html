<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Quiz</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.quiz-page {
            background-color: #f0f8ff; /* Alice Blue */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(41, 182, 246, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .quiz-header {
            margin-bottom: 30px;
        }

        .quiz-header h1 {
            color: #0288d1;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .quiz-header p {
            color: #4fc3f7;
            font-size: 1rem;
        }

        .question-box {
            display: none; /* Hide all initially */
            animation: fadeIn 0.5s ease forwards;
        }

        .question-box.active {
            display: block;
        }

        .question-text {
            color: #01579b;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            font-family: 'Outfit', sans-serif;
            min-height: 60px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: #e1f5fe;
            color: #0288d1;
            border: 2px solid #b3e5fc;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: #b3e5fc;
            transform: scale(1.02);
        }

        .option-btn.wrong {
            background: #ffebee;
            color: #c62828;
            border-color: #ef9a9a;
            animation: shake 0.4s ease;
        }

        .option-btn.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border-color: #a5d6a7;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .feedback-msg {
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 600;
            min-height: 24px;
        }

        .success-box {
            display: none;
            text-align: center;
        }

        .success-box h2 {
            color: #0288d1;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        .success-box p {
            color: #4fc3f7;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .date-btn {
            background: #4fc3f7;
            color: white;
            font-weight: 700;
            padding: 12px 40px;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(79, 195, 247, 0.4);
            display: inline-block;
        }

    </style>
</head>
<body class="quiz-page">

    <div class="quiz-container">
        
        <div class="quiz-header" id="quizHeader">
            <h1>Couple Quiz!</h1>
            <p>ทดสอบความจำกันหน่อย จำเรื่องของเราได้มั้ยเอ่ย? 💙</p>
        </div>

        <!-- Question 1 -->
        <div class="question-box active" id="q1">
            <div class="question-text">1. เดตแรกของเราไปกินอะไรกัน?</div>
            <div class="options-container">
                <button class="option-btn" onclick="checkAnswer(this, false, 'ผิดแล้ว! แกล้งลืมป่าวเนี่ย 😡')">หมูกระทะ</button>
                <button class="option-btn" onclick="checkAnswer(this, true, 'เก่งมากก! จำได้ด้วย 🥰')">ชาบู</button>
                <button class="option-btn" onclick="checkAnswer(this, false, 'มั่วละะ ไม่ใช่สเต็กก')">สเต็ก</button>
            </div>
            <div class="feedback-msg"></div>
        </div>

        <!-- Question 2 -->
        <div class="question-box" id="q2">
            <div class="question-text">2. สถานที่แรกที่เราไปเที่ยวด้วยกันคือที่ไหน?</div>
            <div class="options-container">
                <button class="option-btn" onclick="checkAnswer(this, true, 'ถูกต้องค้าบบบ! 🏖️')">ทะเล</button>
                <button class="option-btn" onclick="checkAnswer(this, false, 'ภูเขาอะไรเล่าา ผิด!')">ภูเขา</button>
                <button class="option-btn" onclick="checkAnswer(this, false, 'คาเฟ่นี้ไปทีหลังงง')">คาเฟ่แมว</button>
            </div>
            <div class="feedback-msg"></div>
        </div>

        <!-- Question 3 -->
        <div class="question-box" id="q3">
            <div class="question-text">3. ใครเป็นคนทักไปจีบก่อน?</div>
            <div class="options-container">
                <button class="option-btn" onclick="checkAnswer(this, false, 'เราไม่ได้ทักก่อนนะ มั่ววว 😝')">เค้าเอง</button>
                <button class="option-btn" onclick="checkAnswer(this, true, 'ช่ายยย เตงทักมาก่อนนั่นแหละ 💙')">เตงไงจะใครล่ะ</button>
            </div>
            <div class="feedback-msg"></div>
        </div>

        <!-- Success Message -->
        <div class="success-box" id="successBox">
            <h2>เก่งมากก! 🎉</h2>
            <p>จำได้หมดเลยยย น่ารักที่สุด รักนะกั๊บบ 💙</p>
            <!-- ลิงก์ไปหน้าวิดีโอ -->
            <a href="video.html" class="date-btn">ไปดูวิดีโอของเราต่อ</a>
        </div>

    </div>

    <!-- Canvas for Confetti -->
    <canvas id="confetti-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100;"></canvas>

    <!-- Confetti JS -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="js/script.js"></script>
    <script>
        let currentQuestion = 1;
        const totalQuestions = 3;

        function checkAnswer(btn, isCorrect, msg) {
            const container = btn.closest('.question-box');
            const feedback = container.querySelector('.feedback-msg');
            const allBtns = container.querySelectorAll('.option-btn');

            if (isCorrect) {
                // Correct Answer
                btn.classList.add('correct');
                feedback.style.color = '#2e7d32';
                feedback.textContent = msg;
                
                // Disable all buttons
                allBtns.forEach(b => b.style.pointerEvents = 'none');

                // Move to next question after delay
                setTimeout(() => {
                    container.classList.remove('active');
                    currentQuestion++;
                    
                    if (currentQuestion <= totalQuestions) {
                        document.getElementById('q' + currentQuestion).classList.add('active');
                    } else {
                        // Show success
                        document.getElementById('quizHeader').style.display = 'none';
                        document.getElementById('successBox').style.display = 'block';
                        fireConfetti();
                    }
                }, 1500);

            } else {
                // Wrong Answer
                btn.classList.add('wrong');
                feedback.style.color = '#c62828';
                feedback.textContent = msg;
                
                // Remove wrong class after animation so it can shake again if clicked
                setTimeout(() => {
                    btn.classList.remove('wrong');
                }, 500);
            }
        }

        function fireConfetti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#4fc3f7', '#b3e5fc', '#0288d1']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#4fc3f7', '#b3e5fc', '#0288d1']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
