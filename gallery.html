<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaroid Memories</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.gallery-page {
            background-color: #f0f8ff; /* Alice Blue */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .gallery-header h1 {
            color: #0288d1;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .gallery-header p {
            color: #4fc3f7;
            font-size: 1.1rem;
        }

        .polaroid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
            perspective: 1000px; /* For 3D flip */
        }

        /* Flip Card Container */
        .polaroid-card {
            background-color: transparent;
            width: 100%;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
        }

        .polaroid-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px rgba(41, 182, 246, 0.2);
            border-radius: 5px;
        }

        .polaroid-card.flipped .polaroid-inner {
            transform: rotateY(180deg);
        }

        .polaroid-front, .polaroid-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: white;
            padding: 15px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
        }

        /* Front side */
        .polaroid-front {
            align-items: center;
        }

        .polaroid-img {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #b3e5fc, #e1f5fe);
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4fc3f7;
            font-weight: 600;
            object-fit: cover;
        }

        .polaroid-caption {
            margin-top: 15px;
            color: #0288d1;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Back side */
        .polaroid-back {
            background: #e1f5fe;
            transform: rotateY(180deg);
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .polaroid-back p {
            color: #01579b;
            font-size: 1.2rem;
            line-height: 1.6;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
        }

        .next-btn-container {
            margin-top: 50px;
            text-align: center;
        }

        .date-btn {
            background: #4fc3f7;
            color: white;
            font-weight: 700;
            padding: 12px 40px;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(79, 195, 247, 0.4);
            display: inline-block;
        }
    </style>
</head>
<body class="gallery-page">

    <div class="gallery-header">
        <h1>Our Memories</h1>
        <p>แตะที่รูปเพื่อดูข้อความที่ซ่อนอยู่นะ 📸💙</p>
    </div>

    <div class="polaroid-grid">
        <!-- Card 1 -->
        <div class="polaroid-card" onclick="this.classList.toggle('flipped')">
            <div class="polaroid-inner">
                <div class="polaroid-front">
                    <!-- Placeholder Image (will replace with real img tag later) -->
                    <div class="polaroid-img">รูปที่ 1</div>
                    <div class="polaroid-caption">Day 1</div>
                </div>
                <div class="polaroid-back">
                    <p>จำได้ไหมว่าวันนั้นเราเขินกันแค่ไหน 🥰</p>
                </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="polaroid-card" onclick="this.classList.toggle('flipped')">
            <div class="polaroid-inner">
                <div class="polaroid-front">
                    <div class="polaroid-img">รูปที่ 2</div>
                    <div class="polaroid-caption">Our Smile</div>
                </div>
                <div class="polaroid-back">
                    <p>ชอบรอยยิ้มของเธอที่สุดในโลกเลย 🩵</p>
                </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="polaroid-card" onclick="this.classList.toggle('flipped')">
            <div class="polaroid-inner">
                <div class="polaroid-front">
                    <div class="polaroid-img">รูปที่ 3</div>
                    <div class="polaroid-caption">Travel</div>
                </div>
                <div class="polaroid-back">
                    <p>ไปเที่ยวด้วยกันอีกบ่อยๆ นะ 🌊</p>
                </div>
            </div>
        </div>

        <!-- Card 4 -->
        <div class="polaroid-card" onclick="this.classList.toggle('flipped')">
            <div class="polaroid-inner">
                <div class="polaroid-front">
                    <div class="polaroid-img">รูปที่ 4</div>
                    <div class="polaroid-caption">You & Me</div>
                </div>
                <div class="polaroid-back">
                    <p>โชคดีจังที่มีเธออยู่ข้างๆ 💙</p>
                </div>
            </div>
        </div>
    </div>

    <div class="next-btn-container">
        <a href="quiz.html" class="date-btn">ไปเล่นเกมกันต่อ!</a>
    </div>

    <script src="js/script.js"></script>
    <script>
        // Reveal animation on load
        const cards = document.querySelectorAll('.polaroid-card');
        cards.forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'scale(0.8) translateY(30px)';
            card.style.transition = 'all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1)';
            
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'scale(1) translateY(0)';
            }, 100 + (index * 150));
        });
    </script>
</body>
</html>
